<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>গ্রাহক ড্যাশবোর্ড — Goynar Gontobbo</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+Bengali:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --gold: #c8973a;
            --gold-light: #e8c97a;
            --gold-pale: #f5e6c8;
            --deep: #1a0e05;
            --warm-dark: #2c1a08;
            --ink: #3d2a10;
            --cream: #faf4e8;
            --blush: #f0e0c4;
            --ruby: #8b1a1a;
            --emerald: #1a4a2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--deep);
            color: var(--cream);
            font-family: 'Cormorant Garamond', serif;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: linear-gradient(to bottom, rgba(26, 14, 5, 0.98), transparent);
            border-bottom: 1px solid rgba(200, 151, 58, 0.15);
            padding: 1.2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--gold);
            text-decoration: none;
        }

        .header-logo span {
            display: block;
            font-family: 'Noto Serif Bengali', serif;
            font-size: 0.75rem;
            color: var(--gold-light);
        }

        .header-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .logout-btn {
            background: var(--ruby);
            color: var(--cream);
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #a01a1a;
        }

        /* ── CONTAINER ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .dashboard-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 40px;
            text-align: center;
        }

        /* ── PROFILE SECTION ── */
        .profile-section {
            background: rgba(42, 28, 12, 0.6);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .profile-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--gold-pale);
            padding-bottom: 10px;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .profile-item {
            background: rgba(61, 42, 16, 0.5);
            padding: 15px;
            border-radius: 4px;
            border-left: 3px solid var(--gold);
        }

        .profile-label {
            font-family: 'Noto Serif Bengali', serif;
            font-size: 12px;
            color: var(--gold-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .profile-value {
            font-size: 16px;
            color: var(--cream);
            word-break: break-word;
        }

        .edit-btn {
            background: var(--gold);
            color: var(--deep);
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .edit-btn:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }

        .toggle-history-btn {
            background: var(--emerald);
            color: var(--cream);
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            transition: all 0.3s ease;
            font-weight: 600;
            margin-top: 20px;
        }

        .toggle-history-btn:hover {
            background: #1a6a4a;
            transform: translateY(-2px);
        }

        /* ── PURCHASE HISTORY ── */
        .purchase-section {
            display: none;
            background: rgba(42, 28, 12, 0.6);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 30px;
        }

        .purchase-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--gold-pale);
            padding-bottom: 10px;
        }

        .purchase-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(200, 151, 58, 0.1);
            border: 1.5px solid var(--gold);
            padding: 20px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .stat-label {
            font-family: 'Noto Serif Bengali', serif;
            font-size: 13px;
            color: var(--gold-light);
            letter-spacing: 1px;
        }

        .purchases-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .purchases-table thead {
            background: rgba(200, 151, 58, 0.1);
            border-bottom: 2px solid var(--gold);
        }

        .purchases-table th {
            padding: 15px;
            text-align: left;
            font-family: 'Noto Serif Bengali', serif;
            font-size: 14px;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .purchases-table td {
            padding: 15px;
            border-bottom: 1px solid var(--gold-pale);
            color: var(--cream);
        }

        .purchases-table tbody tr:hover {
            background: rgba(200, 151, 58, 0.05);
        }

        .no-purchases {
            text-align: center;
            padding: 40px;
            color: var(--gold-light);
            font-style: italic;
        }

        .view-details-btn {
            background: var(--emerald);
            color: var(--cream);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .view-details-btn:hover {
            background: #1a6a4a;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                padding: 1rem;
            }

            .dashboard-title {
                font-size: 1.8rem;
            }

            .profile-grid {
                grid-template-columns: 1fr;
            }

            .purchase-stats {
                grid-template-columns: 1fr;
            }

            .purchases-table {
                font-size: 14px;
            }

            .purchases-table th,
            .purchases-table td {
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <!-- HEADER -->
    <header>
        <a href="index.html" class="header-logo">
            Goynar Gontobbo
            <span>গয়নার গন্তব্য</span>
        </a>
        <div class="header-actions">
            <span id="customerName" style="font-size: 14px;"></span>
            <button class="logout-btn" onclick="logout()">লগআউট</button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="container">
        <h1 class="dashboard-title">আপনার অ্যাকাউন্ট</h1>

        <!-- PROFILE SECTION -->
        <div class="profile-section">
            <h2 class="profile-title">ব্যক্তিগত তথ্য</h2>
            <div class="profile-grid">
                <div class="profile-item">
                    <div class="profile-label">নাম</div>
                    <div class="profile-value" id="profileName">-</div>
                </div>
                <div class="profile-item">
                    <div class="profile-label">ইমেল</div>
                    <div class="profile-value" id="profileEmail">-</div>
                </div>
                <div class="profile-item">
                    <div class="profile-label">ফোন নম্বর</div>
                    <div class="profile-value" id="profilePhone">-</div>
                </div>
                <div class="profile-item">
                    <div class="profile-label">অবস্থান</div>
                    <div class="profile-value" id="profileLocation">-</div>
                </div>
            </div>
            <button class="edit-btn" onclick="editProfile()">প্রোফাইল সম্পাদনা করুন</button>
            <button class="toggle-history-btn" onclick="togglePurchaseHistory()">ক্রয় ইতিহাস দেখুন</button>
        </div>

        <!-- PURCHASE HISTORY SECTION -->
        <div class="purchase-section" id="purchaseSection">
            <h2 class="purchase-title">ক্রয় ইতিহাস</h2>

            <div class="purchase-stats">
                <div class="stat-box">
                    <div class="stat-number" id="totalPurchases">0</div>
                    <div class="stat-label">মোট ক্রয়</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalSpent">৳0</div>
                    <div class="stat-label">মোট খরচ</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="lastPurchaseDate">-</div>
                    <div class="stat-label">শেষ ক্রয়</div>
                </div>
            </div>

            <table class="purchases-table">
                <thead>
                    <tr>
                        <th>অর্ডার আইডি</th>
                        <th>পণ্য</th>
                        <th>তারিখ</th>
                        <th>মূল্য</th>
                        <th>অবস্থা</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="purchasesBody">
                    <tr class="no-purchases">
                        <td colspan="6">এখনও কোনো ক্রয় নেই</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let historyVisible = false;

        // Initialize dashboard
        function initDashboard() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || currentUser.type !== 'customer') {
                window.location.href = 'login.html';
                return;
            }

            // Get customer data
            const customers = JSON.parse(localStorage.getItem('customers') || '[]');
            const customer = customers.find(c => c.email === currentUser.email);

            if (customer) {
                // Display profile info
                document.getElementById('customerName').textContent = customer.name || 'গ্রাহক';
                document.getElementById('profileName').textContent = customer.name || '-';
                document.getElementById('profileEmail').textContent = customer.email || '-';
                document.getElementById('profilePhone').textContent = customer.phone || '-';
                document.getElementById('profileLocation').textContent = customer.location || '-';

                // Build purchase history HTML (but keep it hidden initially)
                buildPurchaseHistory(customer.purchases || []);
            }
        }

        function buildPurchaseHistory(purchases) {
            const purchaseHTML = `
                <h2 class="purchase-title">ক্রয় ইতিহাস</h2>

                <div class="purchase-stats">
                    <div class="stat-box">
                        <div class="stat-number" id="totalPurchases">${purchases.length}</div>
                        <div class="stat-label">মোট ক্রয়</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="totalSpent">${purchases.length > 0 ? '৳' + purchases.reduce((sum, p) => sum + (p.price || 0), 0).toLocaleString('bn-BD') : '৳0'}</div>
                        <div class="stat-label">মোট খরচ</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="lastPurchaseDate">${purchases.length > 0 ? new Date(purchases[purchases.length - 1].date).toLocaleDateString('bn-BD') : '-'}</div>
                        <div class="stat-label">শেষ ক্রয়</div>
                    </div>
                </div>

                <table class="purchases-table">
                    <thead>
                        <tr>
                            <th>অর্ডার আইডি</th>
                            <th>পণ্য</th>
                            <th>তারিখ</th>
                            <th>মূল্য</th>
                            <th>অবস্থা</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="purchasesBody">
                        ${purchases.length === 0 ? '<tr class="no-purchases"><td colspan="6">এখনও কোনো ক্রয় নেই</td></tr>' :
                    purchases.map((p, index) => `
                            <tr>
                                <td>#${index + 1}</td>
                                <td>${p.product || 'পণ্য'}</td>
                                <td>${new Date(p.date).toLocaleDateString('bn-BD')}</td>
                                <td>৳${p.price?.toLocaleString('bn-BD') || '0'}</td>
                                <td>${p.status || 'ডেলিভারি হয়েছে'}</td>
                                <td><button class="view-details-btn">বিস্তারিত</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('purchaseSection').innerHTML = purchaseHTML;
        }

        function togglePurchaseHistory() {
            const purchaseSection = document.getElementById('purchaseSection');
            const toggleBtn = document.querySelector('.toggle-history-btn');

            historyVisible = !historyVisible;

            if (historyVisible) {
                purchaseSection.style.display = 'block';
                toggleBtn.textContent = 'ক্রয় ইতিহাস লুকান';
            } else {
                purchaseSection.style.display = 'none';
                toggleBtn.textContent = 'ক্রয় ইতিহাস দেখুন';
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        function editProfile() {
            alert('প্রোফাইল সম্পাদনা বৈশিষ্ট্য শীঘ্রই আসছে।');
        }

        // Initialize on page load
        window.addEventListener('load', initDashboard);
    </script>
</body>

</html>
