<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>প্রশাসক ড্যাশবোর্ড — Goynar Gontobbo</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+Bengali:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --gold: #c8973a;
            --gold-light: #e8c97a;
            --gold-pale: #f5e6c8;
            --deep: #1a0e05;
            --warm-dark: #2c1a08;
            --ink: #3d2a10;
            --cream: #faf4e8;
            --blush: #f0e0c4;
            --ruby: #8b1a1a;
            --emerald: #1a4a2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--deep);
            color: var(--cream);
            font-family: 'Cormorant Garamond', serif;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: linear-gradient(to bottom, rgba(26, 14, 5, 0.98), transparent);
            border-bottom: 1px solid rgba(200, 151, 58, 0.15);
            padding: 1.2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--gold);
            text-decoration: none;
        }

        .header-logo span {
            display: block;
            font-family: 'Noto Serif Bengali', serif;
            font-size: 0.75rem;
            color: var(--gold-light);
        }

        .header-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .logout-btn {
            background: var(--ruby);
            color: var(--cream);
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #a01a1a;
        }

        /* ── CONTAINER ── */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .dashboard-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 40px;
            text-align: center;
        }

        /* ── STATS SECTION ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: rgba(42, 28, 12, 0.6);
            border: 2px solid var(--gold);
            padding: 25px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .stat-label {
            font-family: 'Noto Serif Bengali', serif;
            font-size: 13px;
            color: var(--gold-light);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── BOOKINGS SECTION ── */
        .bookings-section {
            background: rgba(42, 28, 12, 0.6);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 30px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--gold-pale);
            padding-bottom: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn,
        .add-btn {
            background: var(--gold);
            color: var(--deep);
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .filter-btn:hover,
        .add-btn:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }

        .filter-btn.inactive {
            background: rgba(200, 151, 58, 0.3);
            color: var(--gold-light);
        }

        .bookings-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .bookings-table thead {
            background: rgba(200, 151, 58, 0.1);
            border-bottom: 2px solid var(--gold);
        }

        .bookings-table th {
            padding: 15px;
            text-align: left;
            font-family: 'Noto Serif Bengali', serif;
            font-size: 14px;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .bookings-table td {
            padding: 15px;
            border-bottom: 1px solid var(--gold-pale);
            color: var(--cream);
        }

        .bookings-table tbody tr:hover {
            background: rgba(200, 151, 58, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
        }

        .status-pending {
            background: rgba(200, 151, 58, 0.3);
            color: var(--gold);
        }

        .status-processing {
            background: rgba(26, 74, 46, 0.3);
            color: var(--emerald);
        }

        .status-delivered {
            background: rgba(26, 74, 46, 0.3);
            color: var(--emerald);
        }

        .status-cancelled {
            background: rgba(139, 26, 26, 0.3);
            color: var(--ruby);
        }

        .action-btn {
            background: var(--emerald);
            color: var(--cream);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #1a6a4a;
        }

        .no-bookings {
            text-align: center;
            padding: 40px;
            color: var(--gold-light);
            font-style: italic;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                padding: 1rem;
            }

            .dashboard-title {
                font-size: 1.8rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .bookings-table {
                font-size: 14px;
            }

            .bookings-table th,
            .bookings-table td {
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <!-- HEADER -->
    <header>
        <a href="index.html" class="header-logo">
            Goynar Gontobbo
            <span>গয়নার গন্তব্য</span>
        </a>
        <div class="header-actions">
            <span style="font-size: 14px;">প্রশাসক প্যানেল</span>
            <button class="logout-btn" onclick="logout()">লগআউট</button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="container">
        <h1 class="dashboard-title">প্রশাসক ড্যাশবোর্ড</h1>

        <!-- STATISTICS -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number" id="totalCustomers">0</div>
                <div class="stat-label">মোট গ্রাহক</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="totalOrders">0</div>
                <div class="stat-label">মোট অর্ডার</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="pendingOrders">0</div>
                <div class="stat-label">অপেক্ষারত অর্ডার</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="totalRevenue">৳0</div>
                <div class="stat-label">মোট রাজস্ব</div>
            </div>
        </div>

        <!-- BOOKINGS MANAGEMENT -->
        <div class="bookings-section">
            <h2 class="section-title">অর্ডার ব্যবস্থাপনা</h2>

            <div class="controls">
                <button class="filter-btn active" onclick="filterOrders('all')">সকল অর্ডার</button>
                <button class="filter-btn" onclick="filterOrders('pending')">অপেক্ষারত</button>
                <button class="filter-btn" onclick="filterOrders('processing')">প্রক্রিয়াকরণ</button>
                <button class="filter-btn" onclick="filterOrders('delivered')">ডেলিভারি হয়েছে</button>
                <button class="add-btn" onclick="addNewOrder()">নতুন অর্ডার</button>
            </div>

            <table class="bookings-table">
                <thead>
                    <tr>
                        <th>অর্ডার আইডি</th>
                        <th>গ্রাহক নাম</th>
                        <th>পণ্য</th>
                        <th>তারিখ</th>
                        <th>মূল্য</th>
                        <th>স্থিতি</th>
                        <th>যোগাযোগ</th>
                        <th>ক্রিয়া</th>
                    </tr>
                </thead>
                <tbody id="ordersBody">
                    <tr class="no-bookings">
                        <td colspan="8">কোনো অর্ডার নেই</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allOrders = [];
        let currentFilter = 'all';

        // Initialize dashboard
        function initDashboard() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || currentUser.type !== 'admin') {
                window.location.href = 'login.html';
                return;
            }

            loadOrders();
            updateStatistics();
        }

        function loadOrders() {
            // Get all customers and their purchases
            const customers = JSON.parse(localStorage.getItem('customers') || '[]');
            allOrders = [];

            customers.forEach((customer, customerIndex) => {
                const purchases = customer.purchases || [];
                purchases.forEach((purchase, purchaseIndex) => {
                    allOrders.push({
                        id: `#${customerIndex + 1}-${purchaseIndex + 1}`,
                        customerName: customer.name,
                        customerPhone: customer.phone,
                        product: purchase.product || 'পণ্য',
                        date: purchase.date,
                        price: purchase.price || 0,
                        status: purchase.status || 'pending',
                        notes: purchase.notes || ''
                    });
                });
            });

            displayOrders();
        }

        function displayOrders() {
            const filtered = currentFilter === 'all'
                ? allOrders
                : allOrders.filter(o => o.status === currentFilter);

            const ordersBody = document.getElementById('ordersBody');

            if (filtered.length === 0) {
                ordersBody.innerHTML = '<tr class="no-bookings"><td colspan="8">কোনো অর্ডার নেই</td></tr>';
                return;
            }

            ordersBody.innerHTML = filtered.map(order => `
                <tr>
                    <td>${order.id}</td>
                    <td>${order.customerName}</td>
                    <td>${order.product}</td>
                    <td>${new Date(order.date).toLocaleDateString('bn-BD')}</td>
                    <td>৳${order.price.toLocaleString('bn-BD')}</td>
                    <td>
                        <span class="status-badge status-${order.status}">
                            ${getStatusLabel(order.status)}
                        </span>
                    </td>
                    <td>${order.customerPhone}</td>
                    <td>
                        <button class="action-btn" onclick="updateStatus('${order.id}', 'processing')">আপডেট</button>
                        <button class="action-btn" onclick="viewDetails('${order.id}')">বিস্তারিত</button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusLabel(status) {
            const labels = {
                'pending': 'অপেক্ষারত',
                'processing': 'প্রক্রিয়াকরণ',
                'delivered': 'ডেলিভারি হয়েছে',
                'cancelled': 'বাতিল করা'
            };
            return labels[status] || status;
        }

        function filterOrders(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.classList.add('inactive');
            });
            event.target.classList.remove('inactive');
            event.target.classList.add('active');
            displayOrders();
        }

        function updateStatus(orderId, newStatus) {
            alert(`অর্ডার ${orderId} এর স্থিতি আপডেট করা হয়েছে।`);
            displayOrders();
        }

        function viewDetails(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (order) {
                alert(`
অর্ডার বিস্তারিত:
আইডি: ${order.id}
গ্রাহক: ${order.customerName}
পণ্য: ${order.product}
মূল্য: ৳${order.price}
ফোন: ${order.customerPhone}
স্থিতি: ${getStatusLabel(order.status)}
                `);
            }
        }

        function addNewOrder() {
            alert('নতুন অর্ডার যোগ করার বৈশিষ্ট্য শীঘ্রই আসছে।');
        }

        function updateStatistics() {
            const customers = JSON.parse(localStorage.getItem('customers') || '[]');
            let totalOrders = 0;
            let pendingOrders = 0;
            let totalRevenue = 0;

            customers.forEach(customer => {
                const purchases = customer.purchases || [];
                totalOrders += purchases.length;
                purchases.forEach(purchase => {
                    if (purchase.status === 'pending') pendingOrders++;
                    totalRevenue += purchase.price || 0;
                });
            });

            document.getElementById('totalCustomers').textContent = customers.length;
            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('pendingOrders').textContent = pendingOrders;
            document.getElementById('totalRevenue').textContent = '৳' + totalRevenue.toLocaleString('bn-BD');
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        // Initialize on page load
        window.addEventListener('load', initDashboard);
    </script>
</body>

</html>
